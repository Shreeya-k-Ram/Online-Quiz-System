<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Quiz System</title>
    <link rel="stylesheet" href="style_pro.css">
</head>
<body>
    <h1>Quiz Game</h1>
    <div class="quiz-box">
        <h2>Question will appear here</h2>

        <button class="option-btn">Option 1</button>
        <button class="option-btn">Option 2</button>
        <button class="option-btn">Option 3</button>
        <button class="option-btn">Option 4</button>

        <p>⏳ Time Left: <span id="timer">10</span>sec</p>
        <p>⭐ Score : <span id="score">0</span></p>

        <button>Next</button>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
